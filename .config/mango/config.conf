# MangoWM config
#
# REQUIRED: mango foot swaybg
# OPTIONAL: pipewire pipewire-pulse wireplumber tofi grim slurp
#           wl-clipboard waybar librewolf brightnessctl easyeffects
#           xdg-desktop-portal xdg-desktop-portal-wlr xdg-desktop-portal-gtk
#
# NON-SYSTEMD: remove pipewire/pipewire-pulse/wireplumber exec-once lines.
#              enable via your service manager instead.
#              xdg-desktop-portal-wlr may be at /usr/libexec/

# install wlrobs for obs screen capture

monitorrule=name:.*,width:1920,height:1080,refresh:165,x:0,y:0

env=XDG_SESSION_TYPE,wayland
env=XDG_CURRENT_DESKTOP,sway
env=QT_QPA_PLATFORMTHEME,qt5ct:qt6ct
env=SDL_VIDEODRIVER,wayland
env=GDK_BACKEND,wayland
env=MOZ_ENABLE_WAYLAND,1
env=ELECTRON_OZONE_PLATFORM_HINT,wayland

exec-once=waybar
exec-once=swaybg -i $HOME/.config/wallpapers/darkforest.jpg
# NON-SYSTEMD: delete these three. use your service manager.
exec-once=pipewire
exec-once=pipewire-pulse
exec-once=wireplumber
# NON-SYSTEMD: remove if easyeffects is not available
exec-once=easyeffects --gapplication-service
exec-once=foot --server
exec-once=/usr/lib/xdg-desktop-portal
exec-once=/usr/lib/xdg-desktop-portal-wlr

focuscolor=0xffffffff
bordercolor=0x555555ff
borderpx=2
gappih=8
gappiv=1
gappoh=4
gappov=4
border_radius=0
focused_opacity=1.0
unfocused_opacity=1.0

animations=1
layer_animations=1

animation_duration_move=500
animation_duration_open=500
animation_duration_tag=450
animation_duration_close=450
animation_duration_focus=0

animation_curve_open=0.46,1.0,0.29,1
animation_curve_close=0.1,0.8,0.2,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1

overviewgappo=2
overviewgappi=1

windowrule=focused_opacity:0.8,unfocused_opacity:0.8,appid:foot
windowrule=focused_opacity:0.8,unfocused_opacity:0.8,appid:footclient
windowrule=isnamedscratchpad:1,appid:scratchpad

mousebind=Super,btn_left,moveresize,curmove
mousebind=Super,btn_right,moveresize,curresize

circle_layout=tile,scroller
edge_scroller_pointer_focus=0

# scroller: 50% width, single window fills screen
scroller_default_proportion=0.5
scroller_default_proportion_single=1.0

bind=Super+Shift,X,quit
bind=Super+Shift,R,reload_config
bind=Super+Shift,Z,spawn,sudo zzz

bind=Super,Return,spawn,footclient
bind=Super,D,spawn,tofi-drun
bind=Super,B,spawn,librewolf
bind=Super,T,spawn,thorium-browser --ozone-platform=wayland
bind=Super,Y,spawn,footclient -e yazi
bind=Super+Shift,O,spawn_shell,QT_QPA_PLATFORM=wayland obs
bind=Super+Shift,P,spawn_shell,grim -g "$(slurp)" - | wl-copy

bind=Super,Q,killclient
bind=Super,V,togglefloating
bind=Super+Shift,V,toggle_all_floating
bind=Super,F,togglefullscreen
bind=Super+Shift,F,togglemaximizescreen
bind=Super,C,centerwin
bind=Super,Backslash,toggle_named_scratchpad,scratchpad,none,footclient -a scratchpad

bind=Super,Space,switch_layout
bind=Super,Z,zoom
bind=Super,bracketleft,incnmaster,-1
bind=Super,bracketright,incnmaster,+1
bind=Super,O,toggleoverview

bind=Super,apostrophe,focuslast
bind=Super,H,focusdir,left
bind=Super,J,focusdir,down
bind=Super,K,focusdir,up
bind=Super,L,focusdir,right
bind=Super,Left,focusdir,left
bind=Super,Right,focusdir,right
bind=Super,Up,focusdir,up
bind=Super,Down,focusdir,down

bind=Super,Comma,focusstack,prev
bind=Super,Period,focusstack,next

bind=Super+CTRL,Left,exchange_client,left
bind=Super+CTRL,Right,exchange_client,right
bind=Super+CTRL,Up,exchange_client,up
bind=Super+CTRL,Down,exchange_client,down

bind=Super+SHIFT,Up,resizewin,+0,-50
bind=Super+SHIFT,Down,resizewin,+0,+50
bind=Super+SHIFT,Left,resizewin,-50,+0
bind=Super+SHIFT,Right,resizewin,+50,+0

bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0
bind=Super,0,view,0,0

bind=Super+SHIFT,1,tag,1,0
bind=Super+SHIFT,2,tag,2,0
bind=Super+SHIFT,3,tag,3,0
bind=Super+SHIFT,4,tag,4,0
bind=Super+SHIFT,5,tag,5,0
bind=Super+SHIFT,6,tag,6,0
bind=Super+SHIFT,7,tag,7,0
bind=Super+SHIFT,8,tag,8,0
bind=Super+SHIFT,9,tag,9,0
bind=Super+SHIFT,0,tag,0,0

bind=Super+Shift,B,spawn,brightnessctl set 1

bind=Super,Minus,spawn_shell,S=$(pactl list sinks short | grep RUNNING | grep -v easyeffects | head -1 | cut -f2); [ -n "$S" ] && pactl set-sink-volume "$S" -5%
bind=Super,Equal,spawn_shell,S=$(pactl list sinks short | grep RUNNING | grep -v easyeffects | head -1 | cut -f2); [ -n "$S" ] && pactl set-sink-volume "$S" +5%
bind=Super,M,spawn_shell,S=$(pactl list sinks short | grep RUNNING | grep -v easyeffects | head -1 | cut -f2); [ -n "$S" ] && pactl set-sink-mute "$S" toggle

bind=Super+Alt,Left,movewin,-50,+0
bind=Super+Alt,Right,movewin,+50,+0
bind=Super+Alt,Up,movewin,+0,-50
bind=Super+Alt,Down,movewin,+0,+50

bind=Ctrl+Alt,Left,smartmovewin,left
bind=Ctrl+Alt,Right,smartmovewin,right
bind=Ctrl+Alt,Up,smartmovewin,up
bind=Ctrl+Alt,Down,smartmovewin,down
