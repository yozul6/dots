# Gallant is a 12x22 bitmap font (22px tall).
# For bitmap fonts, use :pixelsize=NATIVE_HEIGHT and dpi-aware=no
# to prevent scaling artifacts.
font=Gallant12:pixelsize=22
dpi-aware=no

# Alternatively, if the above looks too large, try:
# font=Gallant12:size=12
# dpi-aware=yes
# (Alacritty's size=12 uses point-based sizing with DPI awareness)

pad=8x8 center
resize-delay-ms=100
term=foot

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes
blink-rate=500
beam-thickness=1.5

[colors-dark]
alpha=0.8
background=000000
foreground=ffffff

regular0=000000
regular1=ffffff
regular2=ffffff
regular3=ffffff
regular4=ffffff
regular5=ffffff
regular6=ffffff
regular7=ffffff

bright0=666666
bright1=ffffff
bright2=ffffff
bright3=ffffff
bright4=ffffff
bright5=ffffff
bright6=ffffff
bright7=ffffff

selection-foreground=000000
selection-background=ffffff
