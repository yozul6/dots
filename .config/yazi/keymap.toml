# Compress with ouch plugin
[[mgr.prepend_keymap]]
on = ["C"]
run = "plugin ouch"
desc = "Compress with ouch"

# Extract archive with 7z
[[mgr.prepend_keymap]]
on = ["e"]
run = 'shell "7z x -o\"$1_extracted\" \"$1\"" --confirm'
desc = "Extract archive"

# Navigate back/forward in directory history
[[mgr.prepend_keymap]]
on = ["H"]
run = "back"
desc = "Go back to previous directory"

[[mgr.prepend_keymap]]
on = ["L"]
run = "forward"
desc = "Go forward to next directory"

# Quick directory bookmarks (g + key)
[[mgr.prepend_keymap]]
on = ["g", "c"]
run = "cd ~/.config"
desc = "Goto ~/.config"

[[mgr.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/Downloads"
desc = "Goto ~/Downloads"

[[mgr.prepend_keymap]]
on = ["g", "h"]
run = "cd ~"
desc = "Goto home"
